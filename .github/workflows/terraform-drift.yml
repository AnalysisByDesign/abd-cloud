name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  AWS_DEFAULT_REGION: eu-west-1

jobs:
  drift:
    name: Drift ${{ matrix.resource }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        resource:
          - abd-global/account-global/dynamodb
          - abd-global/account-global/cloudtrail
          - abd-global/account-global/s3/access-log
          - abd-global/account-global/s3/lambda
          - abd-global/services-vpc
          - abd-wordpress/account-global/cloudtrail
          - abd-wordpress/account-global/s3/access-log
          - abd-wordpress/account-global/s3/lambda
          - abd-wordpress/wordpress-vpc
          - abd-wordpress/wordpress-vpc/vpc-peering
          - abd-wordpress/wordpress-vpc/db.wordpress
          - abd-wordpress/wordpress-vpc/storage/efs
          - abd-wordpress/wordpress-vpc/storage/s3.wordpress
          - abd-wordpress/wordpress-vpc/storage/s3.training
          - abd-wordpress/wordpress-vpc/app.wordpress
          - abd-wordpress/wordpress-vpc/app.training
          - abd-wordpress/wordpress-vpc/hosted-sites/amyegillin.uk
          - abd-wordpress/wordpress-vpc/hosted-sites/analysisbydesign.co.uk
          - abd-wordpress/wordpress-vpc/hosted-sites/baltihot.co.uk
          - abd-wordpress/wordpress-vpc/hosted-sites/blacklit.uk
          - abd-wordpress/wordpress-vpc/hosted-sites/daverix.uk
          - abd-wordpress/wordpress-vpc/hosted-sites/oranjj.uk
          - abd-wordpress/wordpress-vpc/hosted-sites/rixinteriors.co.uk
          - abd-wordpress/wordpress-vpc/hosted-sites/abd.training

    steps:
      - uses: actions/checkout@v4
        with: { path: abd-cloud }
      - uses: actions/checkout@v4
        with:
          repository: AnalysisByDesign/abd-cloud-params
          path: abd-cloud-params
          token: ${{ secrets.GH_PAT }}
      - uses: actions/checkout@v4
        with:
          repository: AnalysisByDesign/abd-cloud-modules
          path: abd-cloud-modules
          token: ${{ secrets.GH_PAT }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_MANAGEMENT_ACCOUNT_ID }}:role/github-actions-terraform
          aws-region: eu-west-1
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "~1.9", terraform_wrapper: false }

      - name: Terraform Plan (drift check)
        id: plan
        run: |
          set +e
          PLAN_OUTPUT=$(abd-cloud/tf-run.sh $GITHUB_WORKSPACE/abd-cloud-params/${{ matrix.resource }} plan 2>&1)
          EXIT_CODE=$?
          # Detect drift: a clean plan exits 0 and contains "No changes"
          HAS_DRIFT="false"
          echo "$PLAN_OUTPUT" | grep -q "No changes" || HAS_DRIFT="true"
          echo "has_drift=$HAS_DRIFT" >> $GITHUB_OUTPUT
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: File drift issue
        if: steps.plan.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const resource = '${{ matrix.resource }}';
            const planOutput = `${{ steps.plan.outputs.plan_output }}`;
            const title = `[Drift] ${resource}`;
            const body = [
              `## Infrastructure drift detected in \`${resource}\``,
              '',
              `Detected on: ${new Date().toISOString()}`,
              '',
              '<details><summary>Terraform Plan Output</summary>',
              '',
              '```hcl',
              planOutput.slice(0, 60000),
              '```',
              '</details>',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift',
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Updated drift detected:\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['drift'],
              });
            }
